name: quick-impl
description: 'Quick implementation: design → graph → implement → verify'
extends: null
phases:
- id: generate-graph
  kind: gid_command
  command: design
  args:
  - --parse
  model: sonnet
  approval: optional
  skip_if: null
  timeout_minutes: 30
  input: []
  output:
  - path: .gid/graph.yml
    required: true
  hooks:
    pre: []
    post: []
  on_failure:
    type: escalate
  harness_config: null
- id: execute-tasks
  kind: harness
  config_overrides: null
  model: opus
  approval: auto
  skip_if: null
  timeout_minutes: null
  input: []
  output: []
  hooks:
    pre: []
    post: []
  on_failure:
    type: escalate
  harness_config: null
- id: verify
  kind: gid_command
  command: advise
  args: []
  model: null
  approval: auto
  skip_if: null
  timeout_minutes: 15
  input: []
  output: []
  hooks:
    pre: []
    post: []
  on_failure:
    type: escalate
  harness_config: null
config:
  default_model: sonnet
  default_approval: auto
  state_file: .gid/ritual-state.json
  log_file: .gid/execution-log.jsonl
  notify: null
