- file_path: gid_storage/schema.rs
  id: const:gid_storage/schema.rs:SCHEMA_SQL
  metadata:
    line_count: 1
  node_kind: Class
  signature: "pub const SCHEMA_SQL: &str = r#\"\n-- ============================================================\n-- Core Tables\n-- ============================================================\n\n-- Nodes\
    \ table (primary graph nodes)\nCREATE TABLE IF NOT EXISTS nodes (\n    id TEXT PRIMARY KEY,\n    name TEXT NOT NULL,\n    \n    -- Extended metadata fields\n    file_path TEXT,\n    lang TEXT,\n   \
    \ signature TEXT,\n    node_type TEXT,\n    description TEXT,\n    priority INTEGER,\n    assigned_to TEXT,\n    line_start INTEGER,\n    line_end INTEGER,\n    body TEXT,\n    parent_id TEXT,\n   \
    \ depth INTEGER DEFAULT 0,\n    complexity INTEGER,\n    is_public BOOLEAN DEFAULT 0,\n    \n    -- Timestamps\n    created_at INTEGER NOT NULL,\n    updated_at INTEGER NOT NULL,\n    \n    -- Foreign\
    \ key constraint\n    FOREIGN KEY (parent_id) REFERENCES nodes(id) ON DELETE SET NULL\n);\n\n-- Edges table (relationships between nodes)\nCREATE TABLE IF NOT EXISTS edges (\n    from_id TEXT NOT NULL,\n\
    \    to_id TEXT NOT NULL,\n    edge_type TEXT NOT NULL,\n    metadata TEXT, -- JSON\n    created_at INTEGER NOT NULL,\n    \n    PRIMARY KEY (from_id, to_id, edge_type),\n    FOREIGN KEY (from_id) REFERENCES\
    \ nodes(id) ON DELETE CASCADE,\n    FOREIGN KEY (to_id) REFERENCES nodes(id) ON DELETE CASCADE\n);\n\n-- Node metadata (flexible key-value store)\nCREATE TABLE IF NOT EXISTS node_metadata (\n    node_id\
    \ TEXT NOT NULL,\n    key TEXT NOT NULL,\n    value TEXT NOT NULL, -- JSON\n    created_at INTEGER NOT NULL,\n    updated_at INTEGER NOT NULL,\n    \n    PRIMARY KEY (node_id, key),\n    FOREIGN KEY\
    \ (node_id) REFERENCES nodes(id) ON DELETE CASCADE\n);\n\n-- Node tags (categorization)\nCREATE TABLE IF NOT EXISTS node_tags (\n    node_id TEXT NOT NULL,\n    tag TEXT NOT NULL,\n    created_at INTEGER\
    \ NOT NULL,\n    \n    PRIMARY KEY (node_id, tag),\n    FOREIGN KEY (node_id) REFERENCES nodes(id) ON DELETE CASCADE\n);\n\n-- Knowledge base (user-added context)\nCREATE TABLE IF NOT EXISTS knowledge\
    \ (\n    id TEXT PRIMARY KEY,\n    title TEXT NOT NULL,\n    content TEXT NOT NULL,\n    tags TEXT, -- JSON array\n    created_at INTEGER NOT NULL,\n    updated_at INTEGER NOT NULL\n);\n\n-- Configuration\
    \ (system settings)\nCREATE TABLE IF NOT EXISTS config (\n    key TEXT PRIMARY KEY,\n    value TEXT NOT NULL,\n    updated_at INTEGER NOT NULL\n);\n\n-- Change log (audit trail)\nCREATE TABLE IF NOT\
    \ EXISTS change_log (\n    id INTEGER PRIMARY KEY AUTOINCREMENT,\n    node_id TEXT,\n    change_type TEXT NOT NULL, -- 'create', 'update', 'delete'\n    description TEXT NOT NULL,\n    timestamp INTEGER\
    \ NOT NULL,\n    \n    FOREIGN KEY (node_id) REFERENCES nodes(id) ON DELETE SET NULL\n);\n\n-- ============================================================\n-- Indexes for Performance\n-- ============================================================\n\
    \n-- Node lookup optimization\nCREATE INDEX IF NOT EXISTS idx_nodes_name ON nodes(name);\nCREATE INDEX IF NOT EXISTS idx_nodes_file_path ON nodes(file_path);\nCREATE INDEX IF NOT EXISTS idx_nodes_node_type\
    \ ON nodes(node_type);\nCREATE INDEX IF NOT EXISTS idx_nodes_parent_id ON nodes(parent_id);\nCREATE INDEX IF NOT EXISTS idx_nodes_priority ON nodes(priority);\nCREATE INDEX IF NOT EXISTS idx_nodes_assigned_to\
    \ ON nodes(assigned_to);\nCREATE INDEX IF NOT EXISTS idx_nodes_lang ON nodes(lang);\n\n-- Edge lookup optimization\nCREATE INDEX IF NOT EXISTS idx_edges_from ON edges(from_id);\nCREATE INDEX IF NOT\
    \ EXISTS idx_edges_to ON edges(to_id);\nCREATE INDEX IF NOT EXISTS idx_edges_type ON edges(edge_type);\n\n-- Tag lookup optimization\nCREATE INDEX IF NOT EXISTS idx_node_tags_tag ON node_tags(tag);\n\
    \n-- Metadata lookup optimization\nCREATE INDEX IF NOT EXISTS idx_node_metadata_key ON node_metadata(key);\n\n-- Change log optimization\nCREATE INDEX IF NOT EXISTS idx_change_log_node ON change_log(node_id);\n\
    CREATE INDEX IF NOT EXISTS idx_change_log_time ON change_log(timestamp);\nCREATE INDEX IF NOT EXISTS idx_change_log_type ON change_log(change_type);\n\n-- ============================================================\n\
    -- Full-Text Search (FTS5)\n-- ============================================================\n\n-- FTS5 virtual table for node content search\nCREATE VIRTUAL TABLE IF NOT EXISTS nodes_fts USING fts5(\n\
    \    id UNINDEXED,\n    name,\n    description,\n    body,\n    content=nodes,\n    content_rowid=rowid\n);\n\n-- Triggers to keep FTS in sync with nodes table\n\n-- Insert trigger\nCREATE TRIGGER IF\
    \ NOT EXISTS nodes_fts_insert AFTER INSERT ON nodes BEGIN\n    INSERT INTO nodes_fts(rowid, id, name, description, body)\n    VALUES (new.rowid, new.id, new.name, new.description, new.body);\nEND;\n\
    \n-- Delete trigger\nCREATE TRIGGER IF NOT EXISTS nodes_fts_delete AFTER DELETE ON nodes BEGIN\n    DELETE FROM nodes_fts WHERE rowid = old.rowid;\nEND;\n\n-- Update trigger\nCREATE TRIGGER IF NOT EXISTS\
    \ nodes_fts_update AFTER UPDATE ON nodes BEGIN\n    UPDATE nodes_fts SET\n        name = new.name,\n        description = new.description,\n        body = new.body\n    WHERE rowid = new.rowid;\nEND;\n\
    \n-- ============================================================\n-- Schema Version Tracking\n-- ============================================================\n\n-- Insert initial schema version if\
    \ not exists\nINSERT OR IGNORE INTO config (key, value, updated_at) \nVALUES ('schema_version', '1', strftime('%s', 'now'));\n\"#;\n\n/// Schema version for migration tracking\npub const SCHEMA_VERSION:\
    \ i32 = 1;\n\n/// Individual table creation statements (for reference/testing)\npub mod tables"
  source: extract
  start_line: 7
  status: done
  title: SCHEMA_SQL
  type: code
