project:
  name: gepa-core
  description: GEPA prompt evolution crate — task graph derived from design-v2

nodes:
  # ── Semantic nodes: Features / Modules ──

  - id: feat_core_engine
    title: Core Engine
    status: done
    description: |
      The main GEPA optimization loop. Orchestrates Select → Execute → Reflect → Mutate → Accept,
      enforces termination conditions, drives minibatch cycling.
    type: feature
    tags: [module]
    metadata:
      design_ref: "§5"
      req_section: "1. Core Engine"
      goals: ["GOAL-1.1", "GOAL-1.2", "GOAL-1.3", "GOAL-1.4", "GOAL-1.5", "GOAL-1.6", "GOAL-1.7", "GOAL-1.8", "GOAL-1.9"]

  - id: feat_pareto_front
    title: Pareto Front
    status: done
    description: |
      Multi-objective candidate management. Maintains non-dominated set, handles dominance checking,
      acceptance, pruning, and selection.
    type: feature
    tags: [module]
    metadata:
      design_ref: "§6"
      req_section: "2. Pareto Front"
      goals: ["GOAL-2.1", "GOAL-2.2", "GOAL-2.3", "GOAL-2.4"]

  - id: feat_adapter
    title: Adapter Interface
    status: done
    description: |
      GEPAAdapter async trait — the integration boundary. Users implement this to connect
      GEPA to their LLM provider and evaluation logic.
    type: feature
    tags: [module, interface]
    metadata:
      design_ref: "§4"
      req_section: "3. Adapter Interface"
      goals: ["GOAL-3.1", "GOAL-3.2", "GOAL-3.3", "GOAL-3.4", "GOAL-3.5"]

  - id: feat_proposers
    title: Proposers
    status: done
    description: |
      Reflective mutation proposer — constructs mutation context with parent, reflection,
      and accumulated ancestor lessons.
    type: feature
    tags: [module]
    metadata:
      design_ref: "§5.3 step 7"
      req_section: "4. Proposers"
      goals: ["GOAL-4.1", "GOAL-4.2", "GOAL-4.3"]

  - id: feat_candidates
    title: Candidate Management
    status: done
    description: |
      Candidate struct, immutability contract, lineage tracking, ID generation.
    type: feature
    tags: [module]
    metadata:
      design_ref: "§3.2"
      req_section: "5. Candidate Management"
      goals: ["GOAL-5.1", "GOAL-5.2", "GOAL-5.3", "GOAL-5.4"]

  - id: feat_state
    title: State & Checkpointing
    status: done
    description: |
      GEPAState, statistics tracking, atomic checkpoint write/read, resume support.
    type: feature
    tags: [module]
    metadata:
      design_ref: "§3.5, §9"
      req_section: "6. State & Checkpointing"
      goals: ["GOAL-6.1", "GOAL-6.2", "GOAL-6.3"]

  - id: feat_config
    title: Configuration
    status: done
    description: |
      GEPAConfig with validated defaults. All tunable parameters for the engine.
    type: feature
    tags: [module]
    metadata:
      design_ref: "§3.4"
      req_section: "7. Configuration"
      goals: ["GOAL-7.1", "GOAL-7.2", "GOAL-7.3"]

  - id: feat_data_loading
    title: Data Loading
    status: done
    description: |
      DataLoader trait, Example struct, epoch-based minibatch sampling, final validation.
    type: feature
    tags: [module, interface]
    metadata:
      design_ref: "§4, §7"
      req_section: "8. Data Loading"
      goals: ["GOAL-8.1", "GOAL-8.2", "GOAL-8.3", "GOAL-8.4"]

  - id: feat_events
    title: Events
    status: done
    description: |
      GEPAEvent enum, callback registration, built-in TracingCallback.
    type: feature
    tags: [module]
    metadata:
      design_ref: "§8"
      req_section: "9. Events"
      goals: ["GOAL-9.1", "GOAL-9.2"]

  # ── Layer 0: Foundation types (no dependencies) ──

  - id: types_error
    title: GEPAError enum
    status: done
    description: |
      Define GEPAError with 4 variants: AdapterError, ConfigError, EmptyDataError, Cancelled.
      Derive Debug, thiserror::Error. Implements Display.
    type: task
    tags: [foundation, types]
    priority: 0
    metadata:
      design_ref: "§3.1"
      goals: ["GOAL-3.4"]
      guards: ["GUARD-6"]
      file_path: src/error.rs

  - id: types_candidate
    title: Candidate struct
    status: done
    description: |
      Define CandidateId (u64), Candidate struct with id, parameters (HashMap<String,String>),
      parent_id, generation, reflection, lesson. Derive Debug, Clone, Serialize, Deserialize.
      Immutable after creation (GUARD-2).
    type: task
    tags: [foundation, types]
    priority: 0
    metadata:
      design_ref: "§3.2"
      goals: ["GOAL-5.2", "GOAL-5.3", "GOAL-5.4"]
      guards: ["GUARD-2"]
      file_path: src/candidate.rs

  - id: types_example
    title: Example, ExecutionTrace, Reflection structs
    status: done
    description: |
      Define ExampleId (String), Example (id, input as serde_json::Value, expected_output, metadata),
      ExecutionTrace (example_id, output, score, asi), Reflection (diagnosis, improvement_directions).
      All Serialize + Deserialize.
    type: task
    tags: [foundation, types]
    priority: 0
    metadata:
      design_ref: "§3.3"
      goals: ["GOAL-8.2", "GOAL-3.2", "GOAL-3.3"]
      file_path: src/types.rs

  - id: types_config
    title: GEPAConfig struct + Default + validate
    status: done
    description: |
      Define GEPAConfig with all fields (max_iterations, minibatch_size, stagnation_limit,
      checkpoint_interval, pareto_max_size, max_consecutive_skips, retry_max, retry_base_delay,
      time_budget, rng_seed, max_lesson_depth, checkpoint_path).
      Implement Default trait (always succeeds). validate() returns Result<(), GEPAError>.
      Validation: minibatch_size==0, max_iterations==0, stagnation_limit>max_iterations, pareto_max_size<1.
    type: task
    tags: [foundation, types]
    priority: 0
    metadata:
      design_ref: "§3.4"
      goals: ["GOAL-7.1", "GOAL-7.2", "GOAL-7.3"]
      file_path: src/config.rs

  - id: types_termination
    title: TerminationReason enum
    status: done
    description: |
      Define TerminationReason: MaxIterations, TimeBudget, Stagnation, TooManySkips, Cancelled.
      Derive Debug, Clone, Serialize, Deserialize, PartialEq, Eq.
    type: task
    tags: [foundation, types]
    priority: 0
    metadata:
      design_ref: "§3.6"
      goals: ["GOAL-1.2"]
      file_path: src/types.rs

  - id: types_event
    title: GEPAEvent enum
    status: done
    description: |
      Define GEPAEvent with 6 variants: IterationStarted, CandidateAccepted, CandidateRejected,
      IterationSkipped, CheckpointSaved, RunCompleted. Each carries relevant data fields.
      Derive Debug, Clone.
    type: task
    tags: [foundation, types]
    priority: 0
    metadata:
      design_ref: "§8"
      goals: ["GOAL-9.1"]
      file_path: src/event.rs

  - id: types_cancellation
    title: CancellationToken
    status: done
    description: |
      Define CancellationToken wrapping Arc<AtomicBool>. Methods: new(), cancel(), is_cancelled().
      Derive Clone.
    type: task
    tags: [foundation, types]
    priority: 0
    metadata:
      design_ref: "§10"
      goals: ["GOAL-1.2"]
      file_path: src/cancellation.rs

  # ── Layer 1: Traits (depend on foundation types) ──

  - id: trait_adapter
    title: GEPAAdapter async trait
    status: done
    description: |
      Define GEPAAdapter trait with 4 async methods: execute, reflect, mutate, evaluate.
      Bound: Send + Sync + 'static. All return Result<T, GEPAError>.
      Use #[async_trait].
    type: task
    tags: [trait, interface]
    priority: 1
    metadata:
      design_ref: "§4"
      goals: ["GOAL-3.1"]
      guards: ["GUARD-4"]
      file_path: src/adapter.rs

  - id: trait_dataloader
    title: DataLoader trait
    status: done
    description: |
      Define DataLoader trait with sync methods: training_examples() -> Vec<Example>,
      validation_examples() -> Vec<Example>. Bound: Send + Sync + 'static.
    type: task
    tags: [trait, interface]
    priority: 1
    metadata:
      design_ref: "§4"
      goals: ["GOAL-8.1"]
      file_path: src/data_loader.rs

  # ── Layer 2: Core algorithms (depend on types + traits) ──

  - id: pareto_front
    title: ParetoFront struct + dominance + acceptance
    status: done
    description: |
      Implement ParetoFront with:
      - new(max_size), members(), len(), contains()
      - try_accept(child_id, child_scores, front_scores) — dominance check on current minibatch,
        accept if non-dominated, remove dominated members, prune if over capacity
      - Pruning: lowest average score, tie-break by lowest CandidateId
      - debug_assert! front invariant after every mutation (GUARD-1)
      - Serialize + Deserialize for checkpoint
    type: task
    tags: [algorithm, core]
    priority: 2
    metadata:
      design_ref: "§6.1, §6.2, §6.3"
      goals: ["GOAL-1.7", "GOAL-2.1", "GOAL-2.2", "GOAL-2.3", "GOAL-2.4"]
      guards: ["GUARD-1"]
      file_path: src/pareto.rs

  - id: pareto_selection
    title: ParetoFront::select — round-robin selection
    status: done
    description: |
      Implement select(&mut self, rng) -> Result<CandidateId, GEPAError>.
      Round-robin with random shuffle at cycle start. debug_assert non-empty.
      Deterministic given same RNG seed (GUARD-5).
    type: task
    tags: [algorithm, core]
    priority: 2
    metadata:
      design_ref: "§6.4"
      goals: ["GOAL-1.3"]
      guards: ["GUARD-5"]
      file_path: src/pareto.rs

  - id: minibatch_sampler
    title: MinibatchSampler — epoch-based sampling
    status: done
    description: |
      Implement MinibatchSampler with epoch-based coverage:
      - new(example_ids, rng) — shuffle indices
      - next_batch(batch_size, rng) — draw next batch, handle epoch boundary
      - state() -> SamplerState, from_state() for checkpoint resume
      Deterministic given same RNG (GUARD-5).
    type: task
    tags: [algorithm, core]
    priority: 2
    metadata:
      design_ref: "§7"
      goals: ["GOAL-8.3"]
      guards: ["GUARD-5"]
      file_path: src/sampler.rs

  # ── Layer 3: State + Checkpoint (depend on pareto, candidate, config) ──

  - id: state
    title: GEPAState + GEPAStatistics + checkpoint write/read
    status: done
    description: |
      Define GEPAState (pareto_front, candidates HashMap, next_candidate_id, iteration,
      rng_state, statistics, sampler_state). Serialize + Deserialize.
      GEPAStatistics: total_iterations, skipped_iterations, candidates_generated/accepted,
      best_score_history.
      Atomic checkpoint: serialize → write tmp → rename. Read + deserialize for resume.
    type: task
    tags: [state, checkpoint]
    priority: 3
    metadata:
      design_ref: "§3.5, §9"
      goals: ["GOAL-6.1", "GOAL-6.2", "GOAL-6.3"]
      guards: ["GUARD-3"]
      file_path: src/state.rs

  # ── Layer 4: Engine (depends on everything above) ──

  - id: engine_builder
    title: GEPAEngineBuilder + build() + from_state()
    status: done
    description: |
      Implement builder with: new(config), adapter(), data_loader(), seeds(), on_event(),
      cancellation_token(), build() -> Result<GEPAEngine>.
      build() validates all required fields, initializes GEPAState (insert seeds into
      candidates registry + ParetoFront, create MinibatchSampler).
      from_state(state, config) for resume — seeds not required.
    type: task
    tags: [engine]
    priority: 4
    metadata:
      design_ref: "§5.1, §5.2"
      goals: ["GOAL-5.1", "GOAL-1.9"]
      file_path: src/engine.rs

  - id: engine_retry
    title: call_with_retry — retry logic with backoff
    status: done
    description: |
      Implement call_with_retry<T, F, Fut>() -> Result<T, IterationOutcome>.
      Retryable errors: exponential backoff (base_delay * 2^attempt).
      Non-retryable: skip immediately. Check cancellation between retries.
      Reset consecutive_skips on success.
    type: task
    tags: [engine]
    priority: 4
    metadata:
      design_ref: "§5.4"
      goals: ["GOAL-3.5", "GOAL-1.2"]
      file_path: src/engine.rs

  - id: engine_run
    title: GEPAEngine::run() — main optimization loop
    status: done
    description: |
      Implement the full 12-step iteration loop:
      1. Check termination (cancellation → max_iter → time → skips → stagnation)
      2. Emit IterationStarted
      3. Sample minibatch
      4. Select parent from front
      5. Execute (extract parent scores from traces; fallback to evaluate if scores missing)
      6. Reflect
      7. Mutate (build ancestor lesson chain, truncate to max_lesson_depth)
      8. Evaluate child
      9. Evaluate front members (exclude parent)
      10. Accept/Reject via ParetoFront::try_accept
      11. Checkpoint if interval hit
      12. RunCompleted on exit, then final validation
      Score sanitization: NaN→0.0, ±Inf→clamp.
    type: task
    tags: [engine, core]
    priority: 5
    metadata:
      design_ref: "§5.3"
      goals: ["GOAL-1.1", "GOAL-1.2", "GOAL-1.4", "GOAL-1.5", "GOAL-1.6", "GOAL-1.7", "GOAL-1.8", "GOAL-4.1", "GOAL-4.2", "GOAL-4.3"]
      file_path: src/engine.rs

  - id: engine_validation
    title: Final validation — evaluate front on validation set
    status: done
    description: |
      After loop termination: call validation_examples(), evaluate each front candidate,
      select best_candidate by highest average score (ties: higher ID wins).
      If validation empty: set validation_skipped = true.
      Build and return GEPAResult.
    type: task
    tags: [engine]
    priority: 5
    metadata:
      design_ref: "§5.5"
      goals: ["GOAL-8.4", "GOAL-1.8"]
      file_path: src/engine.rs

  - id: tracing_callback
    title: Built-in TracingCallback
    status: done
    description: |
      Implement tracing_callback() -> impl Fn(&GEPAEvent) + Send + Sync.
      Logs each event variant via tracing at appropriate levels (INFO for accept/reject,
      WARN for skipped).
    type: task
    tags: [observability]
    priority: 5
    metadata:
      design_ref: "§8"
      goals: ["GOAL-9.2"]
      file_path: src/event.rs

  # ── Layer 5: Crate entry point + tests ──

  - id: lib_rs
    title: lib.rs — public API surface + re-exports
    status: done
    description: |
      Create lib.rs with pub mod declarations and re-exports of all public types:
      GEPAEngine, GEPAEngineBuilder, GEPAConfig, GEPAAdapter, DataLoader,
      Candidate, Example, ExecutionTrace, Reflection, GEPAEvent, GEPAError,
      GEPAResult, TerminationReason, CancellationToken, tracing_callback.
    type: task
    tags: [api]
    priority: 6
    metadata:
      design_ref: "§3-§12"
      file_path: src/lib.rs

  - id: test_pareto
    title: Unit tests — Pareto front dominance + pruning
    status: done
    description: |
      Test cases:
      - Single candidate always accepted
      - Dominated child rejected
      - Non-dominated child accepted, dominated members removed
      - Pruning triggers at max_size+1, removes lowest avg score
      - Tie-breaking by CandidateId
      - debug_assert invariant holds after all operations
    type: task
    tags: [test]
    priority: 6
    metadata:
      design_ref: "§6"
      file_path: tests/pareto_tests.rs

  - id: test_sampler
    title: Unit tests — MinibatchSampler epoch coverage
    status: done
    description: |
      Test cases:
      - Every example appears exactly once per epoch
      - Epoch boundary concatenation works correctly
      - Deterministic given same RNG seed
      - batch_size >= examples returns all
      - State save/restore produces identical sequence
    type: task
    tags: [test]
    priority: 6
    metadata:
      design_ref: "§7"
      file_path: tests/sampler_tests.rs

  - id: test_engine_e2e
    title: Integration test — full engine loop with mock adapter
    status: done
    description: |
      Create a MockAdapter that returns deterministic scores.
      Run engine for ~10 iterations, verify:
      - Termination reason is MaxIterations
      - GEPAResult contains valid front + best_candidate
      - Statistics are consistent (generated >= accepted)
      - Checkpoint file written and resumable
      - Deterministic: same seed → same result
    type: task
    tags: [test, integration]
    priority: 7
    metadata:
      design_ref: "§5, §6, §7, §9"
      file_path: tests/engine_e2e.rs

  - id: cargo_toml
    title: Cargo.toml — crate manifest
    status: done
    description: |
      Create Cargo.toml for gepa-core crate with dependencies:
      serde, serde_json, tokio (features: time), async-trait, tracing,
      rand, rand_chacha, thiserror. No HTTP/LLM deps (GUARD-4).
    type: task
    tags: [infrastructure]
    priority: 0
    metadata:
      design_ref: "§12"
      guards: ["GUARD-4"]
      file_path: Cargo.toml

