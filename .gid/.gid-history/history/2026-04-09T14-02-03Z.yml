- id: const:gid_storage/schema.rs:fts::CREATE_VIRTUAL_TABLE
  title: fts::CREATE_VIRTUAL_TABLE
  status: done
  type: code
  metadata:
    line_count: 1
  file_path: gid_storage/schema.rs
  start_line: 297
  signature: |-
    pub const CREATE_VIRTUAL_TABLE: &str = r#"
    CREATE VIRTUAL TABLE IF NOT EXISTS nodes_fts USING fts5(
        id UNINDEXED,
        name,
        description,
        body,
        content=nodes,
        content_rowid=rowid
    )
    "#;

        pub const TRIGGER_INSERT: &str = r#"
    CREATE TRIGGER IF NOT EXISTS nodes_fts_insert AFTER INSERT ON nodes BEGIN
        INSERT INTO nodes_fts(rowid, id, name, description, body)
        VALUES (new.rowid, new.id, new.name, new.description, new.body);
    END
    "#;

        pub const TRIGGER_DELETE: &str = r#"
    CREATE TRIGGER IF NOT EXISTS nodes_fts_delete AFTER DELETE ON nodes BEGIN
        DELETE FROM nodes_fts WHERE rowid = old.rowid;
    END
    "#;

        pub const TRIGGER_UPDATE: &str = r#"
    CREATE TRIGGER IF NOT EXISTS nodes_fts_update AFTER UPDATE ON nodes BEGIN
        UPDATE nodes_fts SET
            name = new.name,
            description = new.description,
            body = new.body
        WHERE rowid = new.rowid;
    END
    "#;
    }

