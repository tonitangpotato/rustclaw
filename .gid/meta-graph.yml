# Meta-Graph: Cross-project action items, epics, and references
# This is the central hub for intake-generated action items that span multiple projects.
#
# Node types:
#   action_item — Raw insight from intake (auto-generated, coarse-grained)
#   epic        — Scoped work package with acceptance criteria (triage output)
#   task_ref    — Reference to a task in a project-specific graph
#
# Priority: P0 (this week), P1 (this month), P2 (backlog)
# Status: new → triaged → in_progress → done | dismissed
#
# Lifecycle:
#   1. Intake generates action_item nodes (automatic)
#   2. Triage refines P0 items into epics + task_refs (automatic or manual)
#   3. task_refs point to real tasks in project graphs (e.g., gid-rs/.gid/graph.yml)
#   4. Completion flows back: task done → epic done → action_item done

project:
  name: meta
  description: Cross-project action items and intake-driven work tracking

