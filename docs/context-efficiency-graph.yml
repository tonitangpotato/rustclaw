nodes:
  # Phase 1: Microcompact
  - id: microcompact-fn
    type: task
    label: "Implement microcompact_messages() in session.rs"
    status: todo
    description: "Scan message history, replace old tool_result content (>3 turns, >2K chars) with cleared marker preserving tool name + 200 char preview. Track tokens saved."
    tags: [context, phase-1]

  - id: microcompact-integrate
    type: task
    label: "Integrate microcompact into agent loop"
    status: todo
    description: "Call microcompact_messages() in process_message_with_options before each LLM request (after trim/summarize step). Log tokens saved."
    tags: [context, phase-1]

  - id: microcompact-subagent
    type: task
    label: "Apply microcompact to sub-agent loop"
    status: todo
    description: "Call microcompact in process_with_subagent loop too. Sub-agents accumulate tool results even faster."
    tags: [context, phase-1]

  # Phase 2: Auto-compact
  - id: summary-model-config
    type: task
    label: "Configure summary_model in rustclaw.yaml"
    status: todo
    description: "Add summary_model: claude-haiku-4-5 to rustclaw.yaml. Existing summarize_old_messages() code will activate automatically."
    tags: [context, phase-2]

  - id: summary-model-test
    type: task
    label: "Test auto-compact with Haiku"
    status: todo
    description: "Verify summarization triggers when message count exceeds max_session_messages. Check summary quality and token reduction."
    tags: [context, phase-2]

  # Phase 3: Tool result persist-to-disk
  - id: tool-result-storage-mod
    type: task
    label: "Create src/tool_result_storage.rs module"
    status: todo
    description: "Functions: should_persist(content, threshold) -> bool, persist_result(session_key, tool_call_id, content) -> PathBuf, create_preview(content, path) -> String. Default threshold: 30K chars. Storage dir: ~/.rustclaw/tool-results/{session}/."
    tags: [context, phase-3]

  - id: tool-result-persist-integrate
    type: task
    label: "Integrate persist-to-disk in agent loop"
    status: todo
    description: "After tool execution, before adding result to messages: check should_persist, if true persist and replace content with preview. Apply to both main and sub-agent loops."
    tags: [context, phase-3]

  - id: tool-result-cleanup
    type: task
    label: "Add cleanup for persisted tool results"
    status: todo
    description: "Delete persisted files when session ends or on startup (stale sessions). Add to session cleanup logic."
    tags: [context, phase-3]

  # Phase 4: Event stream
  - id: agent-event-enum
    type: task
    label: "Define AgentEvent enum"
    status: todo
    description: "In src/agent.rs: enum AgentEvent { Text(String), ToolStart{name}, ToolResult{name, preview}, Response(String), Error(String) }."
    tags: [event-stream, phase-4]

  - id: process-message-events
    type: task
    label: "Implement process_message_events() method"
    status: todo
    description: "New method on AgentRunner returning mpsc::Receiver<AgentEvent>. Refactor agent loop to emit events via tx.send(). Text + tool_calls response: emit Text before executing tools."
    tags: [event-stream, phase-4]

  - id: telegram-event-consumer
    type: task
    label: "Telegram consumes AgentEvent stream"
    status: todo
    description: "Replace process_message_with_context call with process_message_events. Consume events: Text -> send immediately, ToolStart -> typing indicator, Response -> final reply."
    tags: [event-stream, phase-4]

  - id: heartbeat-event-compat
    type: task
    label: "Heartbeat compatible with event stream"
    status: todo
    description: "Heartbeat only needs final Response event. Adapt start_heartbeat to use events or keep using string return with a compat wrapper."
    tags: [event-stream, phase-4]

  # Phase 5: Message queue
  - id: message-queue-mod
    type: task
    label: "Create src/message_queue.rs module"
    status: todo
    description: "MessageQueue struct with push/drain methods. QueuedMessage with text, priority (Now/Next/Later), timestamp. Per-session queue stored on AgentRunner."
    tags: [message-queue, phase-5]

  - id: queue-inject-agent-loop
    type: task
    label: "Inject queued messages into agent loop"
    status: todo
    description: "After tool results collected each turn, check session queue. If pending messages, inject as user message content before next LLM call."
    tags: [message-queue, phase-5]

  - id: telegram-queue-push
    type: task
    label: "Telegram pushes to queue when session busy"
    status: todo
    description: "When new message arrives and session has active processing, push to message queue instead of waiting. Session lock mechanism needed."
    tags: [message-queue, phase-5]

  - id: btw-side-question
    type: task
    label: "Implement /btw side question"
    status: todo
    description: "If message starts with /btw: fork lightweight session sharing context snapshot, no tools, single turn. Respond immediately without interrupting main loop."
    tags: [message-queue, phase-5]

edges:
  - from: microcompact-fn
    to: microcompact-integrate
    relation: depends_on

  - from: microcompact-integrate
    to: microcompact-subagent
    relation: depends_on

  - from: summary-model-config
    to: summary-model-test
    relation: depends_on

  - from: tool-result-storage-mod
    to: tool-result-persist-integrate
    relation: depends_on

  - from: tool-result-persist-integrate
    to: tool-result-cleanup
    relation: depends_on

  - from: agent-event-enum
    to: process-message-events
    relation: depends_on

  - from: process-message-events
    to: telegram-event-consumer
    relation: depends_on

  - from: process-message-events
    to: heartbeat-event-compat
    relation: depends_on

  - from: message-queue-mod
    to: queue-inject-agent-loop
    relation: depends_on

  - from: message-queue-mod
    to: telegram-queue-push
    relation: depends_on

  - from: queue-inject-agent-loop
    to: btw-side-question
    relation: depends_on

  - from: telegram-queue-push
    to: btw-side-question
    relation: depends_on

  # Cross-phase dependencies
  - from: microcompact-integrate
    to: tool-result-storage-mod
    relation: depends_on

  - from: summary-model-test
    to: agent-event-enum
    relation: depends_on

  - from: tool-result-cleanup
    to: agent-event-enum
    relation: depends_on

  - from: telegram-event-consumer
    to: message-queue-mod
    relation: depends_on
