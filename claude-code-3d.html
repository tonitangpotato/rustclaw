<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — 3D Architecture Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #050510; 
    color: #e0e0e0; 
    font-family: -apple-system, 'SF Pro Display', 'Inter', sans-serif;
    overflow: hidden;
  }
  #graph-container { 
    width: 100vw; 
    height: 100vh; 
    background: radial-gradient(ellipse at center, #0a0a2e 0%, #050510 70%);
  }
  
  /* HUD - top left */
  #hud {
    position: fixed;
    top: 24px;
    left: 28px;
    z-index: 100;
    pointer-events: none;
  }
  #hud h1 {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    text-shadow: 0 0 30px rgba(100, 160, 255, 0.4);
    margin-bottom: 2px;
  }
  #hud .subtitle {
    font-size: 11px;
    color: rgba(150, 170, 220, 0.6);
    font-weight: 400;
  }
  #hud .stats {
    margin-top: 14px;
    font-size: 10px;
    color: rgba(150, 170, 220, 0.5);
    line-height: 1.8;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  #hud .stats .val { 
    color: rgba(100, 200, 255, 0.9);
    font-weight: 600;
  }
  
  /* Info panel - bottom left */
  #info-panel {
    position: fixed;
    bottom: 28px;
    left: 28px;
    z-index: 100;
    background: rgba(8, 8, 24, 0.88);
    border: 1px solid rgba(100, 160, 255, 0.15);
    border-radius: 12px;
    padding: 18px 22px;
    max-width: 360px;
    min-width: 260px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    font-size: 12px;
    line-height: 1.7;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(100,160,255,0.05);
    transition: opacity 0.3s ease;
  }
  #info-panel .panel-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(100, 160, 255, 0.5);
    margin-bottom: 8px;
  }
  #info-panel .panel-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    text-shadow: 0 0 20px rgba(100,160,255,0.2);
  }
  #info-panel .panel-stat {
    font-size: 11px;
    color: rgba(180, 195, 230, 0.7);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  #info-panel .panel-stat .num {
    color: rgba(100, 220, 255, 0.95);
    font-weight: 600;
  }
  
  /* Navigation breadcrumb - top right */
  #breadcrumb {
    position: fixed;
    top: 24px;
    right: 28px;
    z-index: 100;
    font-size: 11px;
    color: rgba(150,170,220,0.5);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #breadcrumb .crumb {
    color: rgba(100,180,255,0.7);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(100,160,255,0.06);
    border: 1px solid rgba(100,160,255,0.1);
    transition: all 0.2s;
  }
  #breadcrumb .crumb:hover {
    color: #fff;
    background: rgba(100,160,255,0.12);
    border-color: rgba(100,160,255,0.25);
  }
  .crumb-sep { color: rgba(100,160,255,0.3); }
  
  /* Bottom center hint */
  #bottom-hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-size: 10px;
    color: rgba(150,170,220,0.35);
    letter-spacing: 0.5px;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  
  /* Loading screen */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #050510;
    transition: opacity 0.8s ease;
  }
  #loading.fade-out { opacity: 0; pointer-events: none; }
  #loading h1 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(100,160,255,0.3);
  }
  #loading .sub {
    font-size: 12px;
    color: rgba(150,170,220,0.5);
    margin-bottom: 30px;
  }
  .loader-ring {
    width: 36px; height: 36px;
    border: 2px solid rgba(100,160,255,0.15);
    border-top-color: rgba(100,180,255,0.7);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* Scanline overlay */
  #scanlines {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    mix-blend-mode: multiply;
  }
  
  /* Corner decorations */
  .corner-deco {
    position: fixed;
    z-index: 90;
    pointer-events: none;
    width: 40px;
    height: 40px;
  }
  .corner-deco.tl { top: 10px; left: 10px; border-top: 1px solid rgba(100,160,255,0.15); border-left: 1px solid rgba(100,160,255,0.15); }
  .corner-deco.tr { top: 10px; right: 10px; border-top: 1px solid rgba(100,160,255,0.15); border-right: 1px solid rgba(100,160,255,0.15); }
  .corner-deco.bl { bottom: 10px; left: 10px; border-bottom: 1px solid rgba(100,160,255,0.15); border-left: 1px solid rgba(100,160,255,0.15); }
  .corner-deco.br { bottom: 10px; right: 10px; border-bottom: 1px solid rgba(100,160,255,0.15); border-right: 1px solid rgba(100,160,255,0.15); }
</style>
</head>

const GLOW_COLORS = PALETTE.map(c => {
  const r = parseInt(c.slice(1,3),16)/255;
  const g = parseInt(c.slice(3,5),16)/255;
  const b = parseInt(c.slice(5,7),16)/255;

});

// ============================================================
const features = GRAPH_DATA.features;
const featureMap = new Map();
features.forEach((f, i) => {
  f._color = PALETTE[i % PALETTE.length];
  f._glowColor = GLOW_COLORS[i % GLOW_COLORS.length];
  f._idx = i;
  featureMap.set(f.id, f);
});

// Filter feature edges: count > 20
const strongEdges = GRAPH_DATA.feature_edges.filter(e => e.count > 20);
const particleEdges = new Set(
  GRAPH_DATA.feature_edges.filter(e => e.count > 50).map(e => e.source + '|' + e.target)
);
const maxEdgeCount = Math.max(...strongEdges.map(e => e.count));

// ============================================================
// BUILD GRAPH DATA for force-graph
// ============================================================
let currentLevel = 'features'; // 'features' | 'components' | 'files'
let currentFeature = null;
let currentComponent = null;

function buildFeatureGraph() {
  const nodes = features.map((f, i) => ({
    id: f.id,
    name: f.name,
    type: 'feature',
    file_count: f.file_count,
    component_count: f.components.length,
    color: f._color,
    glowColor: f._glowColor,
    val: Math.max(3, Math.sqrt(f.file_count) * 1.5),
    idx: i
  }));
  
  const links = strongEdges.map(e => ({
    source: e.source,
    target: e.target,
    count: e.count,
    hasParticles: particleEdges.has(e.source + '|' + e.target)
  }));
  
  return { nodes, links };
}

function buildComponentGraph(feature) {
  const nodes = feature.components.map((c, i) => ({
    id: c.id,
    name: c.name,
    type: 'component',
    file_count: c.file_count,
    parentFeature: feature,
    color: feature._color,
    glowColor: feature._glowColor,
    val: Math.max(2, Math.sqrt(c.file_count) * 1.2),
    idx: i
  }));
  
  // Add a central "parent" node
  nodes.unshift({
    id: feature.id + ':center',
    name: feature.name,
    type: 'feature-center',
    file_count: feature.file_count,
    color: feature._color,
    glowColor: feature._glowColor,
    val: 6,
    idx: -1
  });
  
  // Link all components to center
  const links = feature.components.map(c => ({
    source: feature.id + ':center',
    target: c.id,
    count: c.file_count
  }));
  
  return { nodes, links };
}

function buildFileGraph(component, feature) {
  const nodes = component.files.map((f, i) => ({
    id: component.id + ':' + f,
    name: f,
    type: 'file',
    color: feature._color,
    glowColor: feature._glowColor,
    val: 1,
    idx: i
  }));
  
  nodes.unshift({
    id: component.id + ':center',
    name: component.name,
    type: 'component-center',
    file_count: component.file_count,
    color: feature._color,
    glowColor: feature._glowColor,
    val: 4,
    idx: -1
  });
  
  const links = component.files.map(f => ({
    source: component.id + ':center',
    target: component.id + ':' + f,
    count: 1
  }));
  
  return { nodes, links };
}

  .backgroundColor('rgba(0,0,0,0)')
  .showNavInfo(false)
  .warmupTicks(80)
  .cooldownTicks(60)
  // Links
  .linkColor(link => {
    const src = featureMap.get(link.source?.id || link.source);
    const tgt = featureMap.get(link.target?.id || link.target);
    const c = src ? src._color : (tgt ? tgt._color : '#334');
    return c + '40'; // semi-transparent
  })
  .linkWidth(link => {
    return Math.max(0.3, (link.count / maxEdgeCount) * 3);
  })
  .linkOpacity(0.4)
  .linkCurvature(0.25)
  .linkCurveRotation(link => {
    // Vary curve rotation per edge for visual variety
    const h = ((link.source?.id || link.source) + (link.target?.id || link.target)).length;
    return (h * 0.37) % (Math.PI * 2);
  })
  .linkDirectionalParticles(link => link.hasParticles ? 3 : 0)
  .linkDirectionalParticleWidth(1.2)
  .linkDirectionalParticleSpeed(0.006)
  .linkDirectionalParticleColor(link => {
    const src = featureMap.get(link.source?.id || link.source);
    return src ? src._color : '#6af';
  })
  // Node rendering
  .nodeThreeObject(node => {
    const group = new THREE.Group();
    
    if (node.type === 'feature' || node.type === 'feature-center') {
      // Main sphere
      const radius = Math.max(2.5, Math.sqrt(node.file_count) * 0.5);
      const geo = new THREE.SphereGeometry(radius, 32, 32);
      const mat = new THREE.MeshPhongMaterial({
        color: node.color,
        emissive: node.color,
        emissiveIntensity: 0.6,
        transparent: true,
        opacity: 0.9,
        shininess: 80,
      });
      const sphere = new THREE.Mesh(geo, mat);
      group.add(sphere);
      
      // Glow halo
      const glowGeo = new THREE.SphereGeometry(radius * 2.2, 16, 16);
      const glowMat = new THREE.MeshBasicMaterial({
        color: node.color,
        transparent: true,
        opacity: 0.08,
        side: THREE.BackSide,
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      group.add(glow);
      
      // Outer ring
      const ringGeo = new THREE.RingGeometry(radius * 1.6, radius * 1.7, 48);
      const ringMat = new THREE.MeshBasicMaterial({
        color: node.color,
        transparent: true,
        opacity: 0.2,
        side: THREE.DoubleSide
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      group.add(ring);
      
      // Label
      const label = new SpriteText(node.name, 2.8);
      label.color = '#fff';
      label.fontFace = '-apple-system, Inter, sans-serif';
      label.fontWeight = '600';
      label.backgroundColor = 'rgba(0,0,0,0.5)';
      label.padding = 1.5;
      label.borderRadius = 2;
      label.position.y = radius + 4;
      group.add(label);
      
    } else if (node.type === 'component' || node.type === 'component-center') {
      const radius = Math.max(1.5, Math.sqrt(node.file_count) * 0.35);
      const geo = new THREE.SphereGeometry(radius, 24, 24);
      const mat = new THREE.MeshPhongMaterial({
        color: node.color,
        emissive: node.color,
        emissiveIntensity: 0.5,
        transparent: true,
        opacity: 0.85,
        shininess: 60,
      });
      const sphere = new THREE.Mesh(geo, mat);
      group.add(sphere);
      
      // Glow
      const glowGeo = new THREE.SphereGeometry(radius * 2, 12, 12);
      const glowMat = new THREE.MeshBasicMaterial({
        color: node.color,
        transparent: true,
        opacity: 0.06,
        side: THREE.BackSide,
      });
      group.add(new THREE.Mesh(glowGeo, glowMat));
      
      // Label for larger components
      if (node.file_count > 5 || node.type === 'component-center') {
        const label = new SpriteText(node.name, 1.8);
        label.color = 'rgba(255,255,255,0.85)';
        label.fontFace = '-apple-system, Inter, sans-serif';
        label.fontWeight = '500';
        label.backgroundColor = 'rgba(0,0,0,0.4)';
        label.padding = 1;
        label.borderRadius = 1.5;
        label.position.y = radius + 2.5;
        group.add(label);
      }
      
    } else if (node.type === 'file') {
      const geo = new THREE.OctahedronGeometry(0.7, 0);
      const mat = new THREE.MeshPhongMaterial({
        color: node.color,
        emissive: node.color,
        emissiveIntensity: 0.4,
        transparent: true,
        opacity: 0.8,
      });
      const mesh = new THREE.Mesh(geo, mat);
      group.add(mesh);
      
      // Small glow
      const glowGeo = new THREE.SphereGeometry(1.4, 8, 8);
      const glowMat = new THREE.MeshBasicMaterial({
        color: node.color,
        transparent: true,
        opacity: 0.04,
        side: THREE.BackSide,
      });
      group.add(new THREE.Mesh(glowGeo, glowMat));
      
      // Only label .tsx files or first 20
      if (node.name.endsWith('.tsx') || node.idx < 15) {
        const label = new SpriteText(node.name, 1.2);
        label.color = 'rgba(255,255,255,0.6)';
        label.fontFace = 'SF Mono, Fira Code, monospace';
        label.fontWeight = '400';
        label.backgroundColor = false;
        label.position.y = 2;
        group.add(label);
      }
    }
    
    return group;
  })
  .nodeLabel(() => '') // We use SpriteText instead
  // Force settings
  .d3AlphaDecay(0.04)
  .d3VelocityDecay(0.3)
  // Click handling
  .onNodeClick(handleNodeClick)
  .onBackgroundClick(handleBackgroundClick);

// ============================================================
// RENDERER SETUP — CRITICAL for quality
// ============================================================
setTimeout(() => {
  const renderer = Graph.renderer();
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  
  // Scene enhancements
  const scene = Graph.scene();
  
  // Fog for depth
  scene.fog = new THREE.FogExp2(0x050510, 0.0012);
  
  // Lighting
  const ambientLight = new THREE.AmbientLight(0x334466, 1.5);
  scene.add(ambientLight);
  
  const dirLight = new THREE.DirectionalLight(0x6688cc, 0.8);
  dirLight.position.set(100, 200, 150);
  scene.add(dirLight);
  
  const dirLight2 = new THREE.DirectionalLight(0xcc6688, 0.4);
  dirLight2.position.set(-100, -100, -150);
  scene.add(dirLight2);
  
  const pointLight = new THREE.PointLight(0x4488ff, 0.6, 500);
  pointLight.position.set(0, 0, 0);
  scene.add(pointLight);
  
  // Ambient star particles
  const starCount = 2000;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(starCount * 3);
  const starSizes = new Float32Array(starCount);
  for (let i = 0; i < starCount; i++) {
    starPos[i*3] = (Math.random() - 0.5) * 1500;
    starPos[i*3+1] = (Math.random() - 0.5) * 1500;
    starPos[i*3+2] = (Math.random() - 0.5) * 1500;
    starSizes[i] = Math.random() * 1.5 + 0.5;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
  
  const starMat = new THREE.PointsMaterial({
    color: 0x6688bb,
    size: 0.8,
    transparent: true,
    opacity: 0.4,
    sizeAttenuation: true,
    blending: THREE.AdditiveBlending,
  });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);
  
  // Animate stars slowly
  function animateStars() {
    stars.rotation.y += 0.00008;
    stars.rotation.x += 0.00003;
    requestAnimationFrame(animateStars);
  }
  animateStars();
  
  // Camera setup
  Graph.cameraPosition({ x: 0, y: 0, z: 350 });
  
  // Auto-rotate slowly
  const controls = Graph.controls();
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  
  // Update HUD
  updateHUD();
  updateInfoPanel();
  
  // Hide loading
  setTimeout(() => {
    document.getElementById('loading').classList.add('fade-out');
    setTimeout(() => document.getElementById('loading').remove(), 800);
  }, 1500);
  
}, 100);

// ============================================================
// NAVIGATION
// ============================================================
function handleNodeClick(node) {
  if (node.type === 'feature') {
    drillIntoFeature(node);
  } else if (node.type === 'component') {
    drillIntoComponent(node);
  } else if (node.type === 'feature-center') {
    // Zoom to center
    smoothZoomTo(node, 100);
  } else if (node.type === 'component-center') {
    smoothZoomTo(node, 60);
  }
}

function handleBackgroundClick() {
  if (currentLevel === 'files') {
    if (currentFeature) {
      drillIntoFeature({ id: currentFeature.id, name: currentFeature.name, color: currentFeature._color });
    } else {
      navigateHome();
    }
  } else if (currentLevel === 'components') {
    navigateHome();
  }
}

function drillIntoFeature(node) {
  const feature = featureMap.get(node.id);
  if (!feature || feature.components.length === 0) return;
  
  currentLevel = 'components';
  currentFeature = feature;
  currentComponent = null;
  
  const data = buildComponentGraph(feature);
  Graph.graphData(data);
  
  // Smooth camera transition
  setTimeout(() => smoothZoomTo({ x: 0, y: 0, z: 0 }, 180), 200);
  
  updateBreadcrumb();
  updateHUD();
  updateInfoPanel(feature);
  
  // Stop auto-rotate when exploring
  Graph.controls().autoRotate = false;
}

function drillIntoComponent(node) {
  const feature = node.parentFeature || currentFeature;
  if (!feature) return;
  
  const component = feature.components.find(c => c.id === node.id);
  if (!component || component.files.length === 0) return;
  
  currentLevel = 'files';
  currentFeature = feature;
  currentComponent = component;
  
  const data = buildFileGraph(component, feature);
  Graph.graphData(data);
  
  setTimeout(() => smoothZoomTo({ x: 0, y: 0, z: 0 }, 120), 200);
  
  updateBreadcrumb();
  updateHUD();
  updateInfoPanel(feature, component);
}

function navigateHome() {
  currentLevel = 'features';
  currentFeature = null;
  currentComponent = null;
  
  const data = buildFeatureGraph();
  Graph.graphData(data);
  
  setTimeout(() => {
    Graph.cameraPosition({ x: 0, y: 0, z: 350 }, { x: 0, y: 0, z: 0 }, 1500);
  }, 200);
  
  // Re-enable auto-rotate
  setTimeout(() => {
    Graph.controls().autoRotate = true;
  }, 1500);
  
  updateBreadcrumb();
  updateHUD();
  updateInfoPanel();
}
window.navigateHome = navigateHome;

function smoothZoomTo(node, distance) {
  const pos = node.x !== undefined ? node : { x: 0, y: 0, z: 0 };
  const distRatio = 1 + distance / Math.hypot(pos.x || 0, pos.y || 0, pos.z || 0 || 1);
  Graph.cameraPosition(
    { x: pos.x * distRatio, y: pos.y * distRatio, z: pos.z * distRatio + distance },
    { x: pos.x || 0, y: pos.y || 0, z: pos.z || 0 },
    1200
  );
}

// ============================================================
// UI UPDATES
// ============================================================
function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '<span class="crumb" onclick="navigateHome()">⬡ Universe</span>';
  
  if (currentFeature) {
    html += '<span class="crumb-sep">›</span>';
    if (currentLevel === 'components') {
      html += `<span class="crumb" style="color:${currentFeature._color};border-color:${currentFeature._color}33">${currentFeature.name}</span>`;
    } else {
      html += `<span class="crumb" onclick="drillIntoFeature({id:'${currentFeature.id}',name:'${currentFeature.name}',color:'${currentFeature._color}'})" style="color:${currentFeature._color}99;border-color:${currentFeature._color}22">${currentFeature.name}</span>`;
    }
  }
  if (currentComponent) {
    html += '<span class="crumb-sep">›</span>';
    html += `<span class="crumb" style="color:${currentFeature._color};border-color:${currentFeature._color}33">${currentComponent.name}</span>`;
  }
  
  bc.innerHTML = html;
}

function updateHUD() {
  const el = document.getElementById('hud-stats');
  if (currentLevel === 'features') {
    el.innerHTML = `
      <div><span class="val">${features.length}</span> features</div>
      <div><span class="val">${GRAPH_DATA.total_components}</span> components</div>
      <div><span class="val">${GRAPH_DATA.total_files.toLocaleString()}</span> source files</div>
      <div><span class="val">${strongEdges.length}</span> connections shown</div>
    `;
  } else if (currentLevel === 'components' && currentFeature) {
    el.innerHTML = `
      <div><span class="val">${currentFeature.components.length}</span> components</div>
      <div><span class="val">${currentFeature.file_count}</span> files</div>
    `;
  } else if (currentLevel === 'files' && currentComponent) {
    el.innerHTML = `
      <div><span class="val">${currentComponent.files.length}</span> files</div>
    `;
  }
}

function updateInfoPanel(feature, component) {
  const panel = document.getElementById('info-panel');
  const nameEl = document.getElementById('panel-name');
  const detailEl = document.getElementById('panel-detail');
  const titleEl = panel.querySelector('.panel-title');
  
  if (component) {
    titleEl.textContent = 'Component';
    nameEl.textContent = component.name;
    nameEl.style.color = feature._color;
    detailEl.innerHTML = `
      <span class="num">${component.file_count}</span> files
    `;
  } else if (feature) {
    titleEl.textContent = 'Feature';
    nameEl.textContent = feature.name;
    nameEl.style.color = feature._color;
    detailEl.innerHTML = `
      <span class="num">${feature.components.length}</span> components · 
      <span class="num">${feature.file_count}</span> files
    `;
  } else {
    titleEl.textContent = 'Architecture Overview';
    nameEl.textContent = 'Claude Code';
    nameEl.style.color = '#fff';
    detailEl.innerHTML = `
      <span class="num">${features.length}</span> features · 
      <span class="num">${GRAPH_DATA.total_components}</span> components · 
      <span class="num">${GRAPH_DATA.total_files.toLocaleString()}</span> files<br>
      <span class="num">${strongEdges.length}</span> / ${GRAPH_DATA.feature_edges.length} edges shown (count>20)
    `;
  }
}

// ============================================================
// Drilldown helper for breadcrumb onclick
// ============================================================
window.drillIntoFeature = function(nodeInfo) {
  const feature = featureMap.get(nodeInfo.id);
  if (feature) {
    currentLevel = 'components';
    currentFeature = feature;
    currentComponent = null;
    Graph.graphData(buildComponentGraph(feature));
    setTimeout(() => smoothZoomTo({ x: 0, y: 0, z: 0 }, 180), 200);
    updateBreadcrumb();
    updateHUD();
    updateInfoPanel(feature);
    Graph.controls().autoRotate = false;
  }
};

// ============================================================
// Performance monitoring
// ============================================================
let frameCount = 0;
let lastFPSTime = performance.now();
function checkFPS() {
  frameCount++;
  const now = performance.now();
  if (now - lastFPSTime > 2000) {
    const fps = Math.round(frameCount / ((now - lastFPSTime) / 1000));
    // Adjust quality if needed
    if (fps < 30) {
      Graph.controls().autoRotateSpeed = 0.15;
    }
    frameCount = 0;
    lastFPSTime = now;
  }
  requestAnimationFrame(checkFPS);
}
checkFPS();

console.log('[INIT] Three.js version:', THREE.REVISION);
console.log('[INIT] Features:', features.length, 'Strong edges:', strongEdges.length);
</script>
